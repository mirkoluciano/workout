<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="WORKOUT">
<title>WORKOUT</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- RETRO GRID CANVAS -->
<canvas id="retro-grid"></canvas>

<div id="app">

  <!-- HEADER -->
  <div class="header">
    <div class="logo" id="logo-name" onclick="switchView('settings')" title="Impostazioni">WORKOUT</div>
    <div class="logo-sub">WORKOUT SYSTEM v2.1</div>
    <div class="day-badge" id="current-day-badge">LUNEDÌ</div>
  </div>

  <!-- WEEK SELECTOR -->
  <div class="week-scroll" id="week-scroll"></div>

  <!-- WORKOUT VIEW -->
  <div id="view-workout" class="view active">
    <div class="progress-wrap">
      <div class="progress-label">
        <span id="progress-text">0 / 0 esercizi</span>
        <span id="progress-pct">0%</span>
      </div>
      <div class="progress-bg">
        <div class="progress-fill" id="progress-fill" style="width:0%"></div>
      </div>
    </div>
    <div id="exercise-list"></div>
  </div>

  <!-- TIMER VIEW -->
  <div id="view-timer" class="view">
    <div class="section-title">// TIMER RIPOSO</div>
    <div class="timer-wrap">
      <div class="clock-canvas-wrap">
        <canvas id="analogClock" width="180" height="180"></canvas>
      </div>
      <div class="digital-timer" id="timer-display">01:00</div>
      <div class="timer-presets">
        <button class="timer-btn" onclick="setTimer(30)">30 SEC</button>
        <button class="timer-btn" onclick="setTimer(60)">60 SEC</button>
        <button class="timer-btn" onclick="setTimer(90)">90 SEC</button>
        <button class="timer-btn" onclick="setTimer(120)">2 MIN</button>
      </div>
      <div class="timer-controls">
        <button class="timer-btn primary" id="timer-start-btn" onclick="toggleTimer()">AVVIA</button>
        <button class="timer-btn" onclick="resetTimer()">RESET</button>
      </div>
    </div>
  </div>

  <!-- CALENDAR VIEW -->
  <div id="view-calendar" class="view">
    <div class="section-title">// CALENDARIO</div>
    <div class="calendar-nav">
      <button class="cal-nav-btn" onclick="calPrev()">&#8249;</button>
      <div class="cal-month-label" id="cal-month-label"></div>
      <button class="cal-nav-btn" onclick="calNext()">&#8250;</button>
    </div>
    <div class="cal-grid">
      <div class="cal-header-cell">LUN</div>
      <div class="cal-header-cell">MAR</div>
      <div class="cal-header-cell">MER</div>
      <div class="cal-header-cell">GIO</div>
      <div class="cal-header-cell">VEN</div>
      <div class="cal-header-cell">SAB</div>
      <div class="cal-header-cell">DOM</div>
      <div id="cal-grid-days" style="display:contents;"></div>
    </div>
    <div id="cal-detail" class="cal-detail"></div>
    <div style="font-size:11px;color:var(--text-muted);margin-top:8px;line-height:1.8;">
      <span style="color:var(--pink);">&#9632;</span> Obbligatorio &nbsp;
      <span style="color:var(--cyan);">&#9632;</span> Facoltativo &nbsp;
      <span style="color:var(--yellow);">&#9633;</span> Oggi
    </div>
  </div>

  <!-- LOG VIEW -->
  <div id="view-log" class="view">
    <div class="section-title">// REGISTRA SESSIONE</div>
    <div class="session-panel">
      <div class="session-row">
        <select class="session-input" id="log-day"></select>
      </div>
      <div class="session-row">
        <input type="number" class="session-input" id="log-calories" placeholder="Calorie (Apple Watch)" />
        <input type="number" class="session-input" id="log-duration" placeholder="Minuti" />
      </div>
      <div class="session-row">
        <select class="session-input" id="log-location">
          <option value="">&#128205; Dove ti sei allenato?</option>
        </select>
      </div>
      <div class="session-row">
        <input type="text" class="session-input" id="log-notes" placeholder="Note libere..." />
      </div>
      <button class="log-btn" onclick="saveSession()">// SALVA SESSIONE</button>
    </div>
  </div>

  <!-- HISTORY VIEW -->
  <div id="view-history" class="view">
    <div class="section-title">// STORICO</div>
    <div id="history-list"></div>
  </div>

  <!-- SETTINGS VIEW -->
  <div id="view-settings" class="view">
    <div class="section-title">// CONFIGURAZIONE</div>

    <div class="settings-panel">
      <label class="settings-label">NOME ATLETA</label>
      <input type="text" class="settings-input" id="settings-name" placeholder="Il tuo nome..." maxlength="20" />
      <button class="settings-btn" onclick="saveName()">SALVA NOME</button>
    </div>

    <div class="settings-panel">
      <label class="settings-label">LUOGHI DI ALLENAMENTO</label>
      <div class="location-list" id="location-list"></div>
      <div class="location-add-row">
        <input type="text" class="settings-input" id="new-location" placeholder="Nuovo luogo..." style="margin-bottom:0;" />
        <button class="settings-btn" onclick="addLocation()">ADD</button>
      </div>
    </div>

    <div class="settings-panel">
      <label class="settings-label">SCHEDE ALLENAMENTO</label>
      <div id="schedule-list"></div>
      <div style="margin-top:10px;border-top:1px solid var(--border);padding-top:10px;">
        <label class="settings-label">CREA NUOVA SCHEDA</label>
        <input type="text" class="settings-input" id="new-schedule-name" placeholder="Nome scheda..." />
        <button class="settings-btn" onclick="createCustomSchedule()">CREA SCHEDA</button>
      </div>
    </div>
  </div>

</div>

<!-- BY BANDICOOT FOOTER -->
<div class="bandicoot-footer">
  <span class="by-bandicoot">by BANDICOOT</span>
</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <div class="nav-item active" id="nav-workout" onclick="switchView('workout')">
    <div class="nav-icon-txt">W</div>
    <div class="nav-label">WORKOUT</div>
  </div>
  <div class="nav-item" id="nav-timer" onclick="switchView('timer')">
    <div class="nav-icon-txt">T</div>
    <div class="nav-label">TIMER</div>
  </div>
  <div class="nav-item" id="nav-calendar" onclick="switchView('calendar')">
    <div class="nav-icon-txt">CAL</div>
    <div class="nav-label">CALENDARIO</div>
  </div>
  <div class="nav-item" id="nav-log" onclick="switchView('log')">
    <div class="nav-icon-txt">LOG</div>
    <div class="nav-label">LOG</div>
  </div>
  <div class="nav-item" id="nav-history" onclick="switchView('history')">
    <div class="nav-icon-txt">REC</div>
    <div class="nav-label">STORICO</div>
  </div>
  <div class="nav-item" id="nav-settings" onclick="switchView('settings')">
    <div class="nav-icon-txt">CFG</div>
    <div class="nav-label">CONFIG</div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
